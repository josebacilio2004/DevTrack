<svg xmlns="http://www.w3.org/2004/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b600f8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="10" y="10" width="80" height="80" rx="15" fill="#0e0e0e" stroke="url(#neonGradient)" stroke-width="4" filter="url(#glow)"/>
  <path d="M35 30 L65 50 L35 70 Z" fill="url(#neonGradient)" filter="url(#glow)"/>
  <path d="M30 20 L70 20 M30 80 L70 80" stroke="rgba(0, 242, 255, 0.3)" stroke-width="2" stroke-linecap="round"/>
</svg>
